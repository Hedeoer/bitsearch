name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="${{ vars.DOCKERHUB_IMAGE }}"
          if [ -z "$image" ]; then
            image="local/bitsearch"
          fi
          echo "name=$image" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub configuration
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ vars.DOCKERHUB_USERNAME }}" ]; then
            echo "Missing repository variable DOCKERHUB_USERNAME" >&2
            exit 1
          fi
          if [ -z "${{ vars.DOCKERHUB_IMAGE }}" ]; then
            echo "Missing repository variable DOCKERHUB_IMAGE" >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing repository secret DOCKERHUB_TOKEN" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
