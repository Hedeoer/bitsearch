services:
  bitsearch:
    image: ${BITSEARCH_IMAGE:-docker.io/your-dockerhub-namespace/bitsearch:latest}
    container_name: bitsearch
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8097}:${APP_PORT:-8097}"
    environment:
      NODE_ENV: production
      APP_PORT: ${APP_PORT:-8097}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DATABASE_PATH: /app/data/bitsearch.db
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      ADMIN_AUTH_KEY: ${ADMIN_AUTH_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN}
    volumes:
      - bitsearch_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APP_PORT:-8097}/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  bitsearch_data:
